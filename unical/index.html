<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Unicode Calendar</title>
<style>
  :root {
    --bg: #f7f7ff;
    --panel: #0d0f11;
    --ink: #400090;
    --dim: #8a929a;
    --faint: #565c62;
    --accent: #00c0f0;
    --line: #c0e0f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
  }

  header { text-align: center; }
  h1 {
    font-size: 2rem;
    font-weight: 500;
    color: var(--dim);
  }

  /* The five-day strip */
  .strip {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: clamp(8px, 2.4vw, 26px);
    width: 100%;
  }
  .cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    text-align: center;
  }
  .glyph {
    font-family: "Noto Sans", "Segoe UI Symbol", system-ui, sans-serif;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #80008010;
    /* border: 1px solid var(--line); */
  }
  .cell.side .glyph {
    width: 8rem;
    height: 8rem;
    font-size: 6rem;
    color: var(--dim);
  }
  .cell.today .glyph {
    width: 12rem;
    height: 12rem;
    font-size: 10rem;
    color: var(--ink);
    border-color: var(--faint);
  }
  .cell .cp {
    font-size: 1rem;
    color: var(--faint);
  }
  .cell .label {
    font-size: 1rem;
    color: var(--faint);
  }
  .cell.today .label { color: var(--accent); }
  .cell.today .cp { color: var(--dim); }
  .cell .def {
    font-size: 0.8rem;
    line-height: 1.35;
    color: var(--dim);
    max-width: 9rem;
    text-wrap: balance;
  }
  .cell.today .def {
    font-size: 1rem;
    color: var(--ink);
    max-width: 13rem;
  }
  .cell .def:empty { display: none; }

  /* Time readout */
  .clock {
    text-align: center;
  }
  .clock .time {
    font-size: 4rem;
    font-weight: 600;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .clock .time .lo { color: var(--faint); }
  .clock .cap {
    margin-top: 6px;
    font-size: 1rem;
    color: var(--faint);
  }

  /* Era panel */
  .era {
    width: min(560px, 100%);
    /* border: 1px solid var(--line); */
    padding: 18px 22px;
  }
  .era .top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
  }
  .era .name { font-size: 1rem; color: var(--ink); }
  .era .range { font-size: clamp(10px, 1.6vw, 12px); color: var(--dim); }
  .bar {
    margin-top: 14px;
    height: 3px;
    background: var(--line);
  }
  .bar > i {
    display: block;
    height: 100%;
    background: var(--accent);
  }
  .era .pct {
    margin-top: 8px;
    font-size: clamp(9px, 1.5vw, 11px);
    color: var(--faint);
    display: flex;
    justify-content: space-between;
  }


</style>
</head>
<body>
  <header>
    <h1>Unicode Calendar</h1>
  </header>

  <main class="strip" id="strip"></main>

  <section class="clock">
    <div class="time" id="time">····</div>
    <!-- <div class="cap">time within today's character (low 16 bits, hex)</div> -->
  </section>

  <section class="era">
    <div class="top">
      <span class="name" id="eraName">—</span>
      <span class="range" id="eraRange">—</span>
    </div>
    <div class="bar"><i id="eraBar" style="width:0%"></i></div>
    <div class="pct">
      <span id="eraPct">—</span>
      <span id="eraCp">—</span>
    </div>
  </section>

<script>
// ---- Unicode block table (BMP, U+0000–U+FFFF) -------------------------------
// [start, end, name]

  [0xAAE0,0xAAFF,"Meetei Mayek Extensions"],
  [0xAB00,0xAB2F,"Ethiopic Extended-A"],
  [0xAB30,0xAB6F,"Latin Extended-E"],
  [0xAB70,0xABBF,"Cherokee Supplement"],
  [0xABC0,0xABFF,"Meetei Mayek"],
  [0xAC00,0xD7AF,"Hangul Syllables"],
  [0xD7B0,0xD7FF,"Hangul Jamo Extended-B"],
  [0xD800,0xDB7F,"High Surrogates"],
  [0xDB80,0xDBFF,"High Private Use Surrogates"],
  [0xDC00,0xDFFF,"Low Surrogates"],
  [0xE000,0xF8FF,"Private Use Area"],
  [0xF900,0xFAFF,"CJK Compatibility Ideographs"],
  [0xFB00,0xFB4F,"Alphabetic Presentation Forms"],
  [0xFB50,0xFDFF,"Arabic Presentation Forms-A"],
  [0xFE00,0xFE0F,"Variation Selectors"],
  [0xFE10,0xFE1F,"Vertical Forms"],
  [0xFE20,0xFE2F,"Combining Half Marks"],
  [0xFE30,0xFE4F,"CJK Compatibility Forms"],
  [0xFE50,0xFE6F,"Small Form Variants"],
  [0xFE70,0xFEFF,"Arabic Presentation Forms-B"],
  [0xFF00,0xFFEF,"Halfwidth and Fullwidth Forms"],
  [0xFFF0,0xFFFF,"Specials"],
];

const TICK = 65536;           // seconds per code-point ("one day")
const $ = id => document.getElementById(id);

function blockOf(cp){
  for (const b of BLOCKS) if (cp >= b[0] && cp <= b[1]) return b;
  return null;
}
function fmtDate(unix){
  return new Date(unix*1000).toLocaleDateString(undefined,
    {year:'numeric', month:'short', day:'numeric'});
}
function glyph(cp){
  // Surrogate halves & specials aren't renderable — show the code point instead.
  try {
    if (cp >= 0xD800 && cp <= 0xDFFF) return '�';
    return String.fromCodePoint(cp);
  } catch(e){ return '�'; }
}
function hex4(n){ return n.toString(16).toUpperCase().padStart(4,'0'); }

const OFFSETS = [
  {d:-2, cls:'side', label:'ereyesterday'},
  {d:-1, cls:'side', label:'yesterday'},
  {d: 0, cls:'today', label:'today'},
  {d:+1, cls:'side', label:'tomorrow'},
  {d:+2, cls:'side', label:'overmorrow'},
];

// Build strip skeleton once
const strip = $('strip');
strip.innerHTML = OFFSETS.map((o,i)=>`
  <div class="cell ${o.cls}">
    <div class="glyph" id="g${i}"></div>
    <div class="cp" id="cp${i}"></div>
    <div class="label">${o.label}</div>
    <div class="def" id="d${i}"></div>
  </div>`).join('');

// ---- Definitions (Unihan, U+3400–U+FA2D) -----------------------------------
// "HEX<TAB>definition" per line. Absent until the fetch lands; render() copes.
let DEFS = null;

fetch('defs.txt')
  .then(r => r.ok ? r.text() : Promise.reject(new Error('HTTP ' + r.status)))
  .then(text => {
    DEFS = new Map();
    for (const line of text.split('\n')) {
      const tab = line.indexOf('\t');
      if (tab > 0) DEFS.set(parseInt(line.slice(0, tab), 16), line.slice(tab + 1));
    }
    render();
  })
  .catch(() => {});   // no definitions is a fine degradation

function render(){
  const now = (Date.now()/1000);
  const cp = Math.floor(now / TICK);      // today's code point
  const lo = Math.floor(now) - cp * TICK;             // 0 .. 65535  → the "clock"

  // strip glyphs
  OFFSETS.forEach((o,i)=>{
    const c = cp + o.d;
    $('g'+i).textContent = glyph(c);
    $('cp'+i).textContent = 'U+' + hex4(c);
    $('d'+i).textContent = DEFS ? (DEFS.get(c) || '') : '';
  });

  // time = full 16-bit position within the day, hex, with a running low nibble
	$('time').innerHTML = '<span class="lo" style="opacity:0.3">' + hex4(cp) + '</span>' + hex4(lo).replace(/(.{2})(.{2})/, '$1<span class="lo">$2</span>');

  // era panel
  const b = blockOf(cp);
  if (b){
    const [s,e,name] = b;
    const startU = s * TICK, endU = (e+1) * TICK;   // era ends when next block begins
    const span = endU - startU;
    const done = (now - startU) / span;
    $('eraName').textContent = name;
    $('eraRange').textContent = fmtDate(startU) + '  —  ' + fmtDate(endU);
    $('eraBar').style.width = (done*100).toFixed(3) + '%';
    $('eraPct').textContent = (done*100).toFixed(9) + '% through this era';
    $('eraCp').textContent = 'U+'+hex4(s)+'–U+'+hex4(e);
  } else {
    $('eraName').textContent = 'Beyond the BMP';
    $('eraRange').textContent = fmtDate(cp*TICK);
    $('eraBar').style.width = '100%';
    $('eraPct').textContent = 'U+'+hex4(cp);
    $('eraCp').textContent = '';
  }
}

render();
setInterval(render, 1000);
</script>
</body>
</html>
